<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>القرآن الكريم</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vazirmatn/33.0.0/Vazirmatn-font-face.min.css">
    <link href="https://cdn.fontcdn.ir/Font/Persian/Vazir/Vazir.css" rel="stylesheet" type="text/css">

    <style>
        body {
            background-color: #0d1622;
            font-family: 'Vazirmatn', 'Vazir', 'B Yekan', Tahoma, Arial, sans-serif !important;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        .menu-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(6px); 
            -webkit-backdrop-filter: blur(6px);
            color: #cfddec;
            border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            font-size: 20px;
            cursor: pointer;
            padding: 12px 16px;
            border-radius: 14px;
            opacity: 0.8;
            transition: all 0.4s ease;
            z-index: 1002;
        }
        
        .menu-toggle:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }

        /* دکمه دانلود آفلاین خارج از منو (بالا چپ) */
        .main-download-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(6px); 
            -webkit-backdrop-filter: blur(6px);
            color: #8da4be;
            border: 1px solid rgba(255, 255, 255, 0.15); 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            font-size: 13px;
            font-family: 'Vazirmatn', 'Vazir', Tahoma, sans-serif !important;
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 12px;
            opacity: 0.7;
            transition: all 0.4s ease;
            z-index: 1002;
        }
        
        .main-download-btn:hover {
            opacity: 1;
            color: #cfddec;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .progress-tooltip {
            position: fixed;
            top: 65px;
            left: 20px;
            color: #8da4be;
            font-size: 11px;
            background: rgba(13, 22, 34, 0.8);
            padding: 4px 8px;
            border-radius: 6px;
            display: none;
            z-index: 1002;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -220px; 
            width: 190px;
            background: rgba(17, 29, 43, 0.75); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            height: 100vh;
            box-sizing: border-box; 
            padding: 85px 0 20px 0; 
            display: flex;
            flex-direction: column;
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
            z-index: 1001;
            transition: right 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .sidebar.open {
            right: 0;
        }
        
        .sidebar-title {
            font-family: 'Vazirmatn', 'Vazir', Tahoma, sans-serif !important;
            color: #8da4be;
            text-align: center;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: bold;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 15px;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        #juzList {
            overflow-y: auto;
            flex-grow: 1;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.2) transparent;
            padding-bottom: 10px;
        }
        
        .sidebar button.juz-btn {
            font-family: 'Vazirmatn', 'Vazir', Tahoma, sans-serif !important;
            display: block;
            width: 82%;
            margin: 6px auto;
            padding: 9px;
            background: rgba(255, 255, 255, 0.05);
            color: #8da4be;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .sidebar button.juz-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            transform: scale(1.02);
        }

        .sidebar button.delete-btn {
            color: #c96a75;
            border: 1px dashed rgba(201, 106, 117, 0.3);
            background: transparent;
            margin-top: 25px; 
            margin-bottom: 15px;
        }
        .sidebar button.delete-btn:hover {
            background: rgba(201, 106, 117, 0.1);
            border-color: rgba(201, 106, 117, 0.5);
            color: #e57e8a;
        }

        .main-content {
            position: relative;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: transparent;
            overflow-y: auto;
            width: 100%;
        }
        
        .quran-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            height: 96vh;
            width: 100%;
            padding: 0 40px;
            box-sizing: border-box;
        }
        
        .page {
            height: 100%;
            max-width: 48%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-color: white;
            transition: filter 0.3s;
        }
        
        .nav-btn {
            position: absolute;
            top: 0;
            height: 100%;
            background: rgba(13, 22, 34, 0.05); 
            backdrop-filter: blur(3px); 
            -webkit-backdrop-filter: blur(3px);
            color: #8da4be;
            padding: 0 8px; 
            cursor: pointer;
            z-index: 100;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            opacity: 0.7;
            transition: all 0.4s ease;
        }
        
        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            opacity: 1;
        }
        
        .right-btn { 
            right: 0; 
            border-left: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .left-btn { 
            left: 0; 
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            color: #cfddec;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 20px; 
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 0;
            padding: 0;
            cursor: pointer;
            opacity: 0.7;
            z-index: 1000;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .fullscreen-btn:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.1);
        }

        @media screen and (max-width: 768px) {
            body { overflow: auto; }
            .main-content {
                height: auto;
                align-items: flex-start;
                padding-bottom: 100px;
            }
            .quran-container {
                flex-direction: column;
                height: auto;
                padding: 80px 10px 20px 10px;
                gap: 20px;
            }
            .page {
                max-width: 95%;
                height: auto;
            }
            .nav-btn {
                position: fixed;
                top: auto;
                bottom: 25px;
                height: auto;
                padding: 15px 22px;
                border-radius: 25px;
                border: 1px solid rgba(255, 255, 255, 0.1);
                box-shadow: 0 5px 20px rgba(0,0,0,0.4);
                font-size: 20px;
                background: rgba(13, 22, 34, 0.6);
            }
            .right-btn { right: 20px; }
            .left-btn { left: 20px; margin-left: 60px; }
            
            .fullscreen-btn {
                bottom: 25px;
                left: 15px;
                width: 45px;
                height: 45px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <button id="mainDownloadBtn" class="main-download-btn" onclick="startDownload()">📥 دانلود آفلاین</button>
    <div id="progressTooltip" class="progress-tooltip">در حال دانلود...</div>

    <button class="menu-toggle" onclick="toggleSidebar()" title="منو">&#9776;</button>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-title">فهرست اجزاء</div>
        <div id="juzList"></div>
    </div>

    <div class="main-content">
        <button class="nav-btn right-btn" onclick="prevPage()" title="صفحه قبل">&#10094;</button>

        <div class="quran-container">
            <img id="rightPage" class="page" alt="صفحه راست">
            <img id="leftPage" class="page" alt="صفحه چپ">
        </div>

        <button class="nav-btn left-btn" onclick="nextPage()" title="صفحه بعد">&#10095;</button>
        
        <button class="fullscreen-btn" onclick="toggleFullScreen()" title="تمام صفحه">⤢</button>
    </div>

    <script>
        const totalPages = 623;
        let currentPage = 1;
        let isDownloaded = false; 

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker ثبت شد', reg))
                    .catch(err => console.log('خطا در ثبت Service Worker', err));
            });
        }

        // --- توابع مربوط به آفلاین و دانلود --- //

        // تغییرات اعمال شده: این تابع دکمه دانلود را کاملا مخفی میکند
        function setDownloadedUI() {
            const dlBtn = document.getElementById('mainDownloadBtn');
            dlBtn.style.display = "none"; // مخفی کردن کامل دکمه
            document.getElementById('progressTooltip').style.display = "none";
            
            const delBtn = document.getElementById('deleteBtnSidebar');
            if(delBtn) delBtn.style.display = "block"; // نمایش دکمه حذف در انتهای لیست
            isDownloaded = true;
        }

        // تغییرات اعمال شده: وقتی کش پاک شد، دکمه دانلود دوباره ظاهر میشود
        function resetDownloadedUI() {
            const dlBtn = document.getElementById('mainDownloadBtn');
            dlBtn.style.display = "block"; // برگرداندن دکمه
            dlBtn.innerHTML = "📥 دانلود آفلاین";
            dlBtn.style.pointerEvents = "auto";
            
            const delBtn = document.getElementById('deleteBtnSidebar');
            if(delBtn) delBtn.style.display = "none"; // پنهان کردن دکمه حذف
            isDownloaded = false;
        }

        async function startDownload() {
            if (confirm("آیا مطمئن هستید که می‌خواهید تمام صفحات را دانلود کنید؟\nحجم این فایل‌ها حدود ۷۰ مگابایت است.")) {
                const dlBtn = document.getElementById('mainDownloadBtn');
                const progress = document.getElementById('progressTooltip');
                
                dlBtn.style.pointerEvents = "none";
                dlBtn.innerHTML = "⏳ لطفاً صبر کنید...";
                progress.style.display = "block";
                progress.style.color = "#8da4be";

                try {
                    const cache = await caches.open('quran-cache-v1');
                    let downloadedCount = 0;
                    
                    const batchSize = 20; 
                    for (let i = 1; i <= totalPages; i += batchSize) {
                        const promises = [];
                        for (let j = 0; j < batchSize && (i + j) <= totalPages; j++) {
                            let pageNum = formatPageNumber(i + j);
                            let imgUrl = `Quran${pageNum}.jpg`;
                            
                            promises.push(
                                fetch(imgUrl).then(response => {
                                    if (response.ok) {
                                        return cache.put(imgUrl, response);
                                    }
                                })
                            );
                        }
                        await Promise.all(promises);
                        downloadedCount += promises.length;
                        progress.innerText = `دریافت: ${downloadedCount} از ${totalPages}`;
                    }
                    
                    setDownloadedUI();
                } catch (error) {
                    console.error("خطا در دانلود:", error);
                    progress.innerText = "خطا! اینترنت را چک کنید.";
                    progress.style.color = "#c96a75"; 
                    dlBtn.style.pointerEvents = "auto";
                    dlBtn.innerHTML = "🔄 تلاش مجدد";
                }
            }
        }

        async function deleteOfflineFiles() {
            if (confirm("آیا از حذف فایل‌های آفلاین مطمئن هستید؟ این کار حدود ۷۰ مگابایت از فضای دستگاه شما را آزاد می‌کند.")) {
                try {
                    await caches.delete('quran-cache-v1');
                    resetDownloadedUI();
                    alert("فایل‌های آفلاین با موفقیت حذف شدند.");
                } catch(e) {
                    console.error("خطا در حذف فایل‌ها:", e);
                }
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {});
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        function toPersianNum(num) {
            const farsiDigits = ['۰', '۱', '۲', '۳', '۴', '۵', '۶', '۷', '۸', '۹'];
            return num.toString().replace(/\d/g, x => farsiDigits[x]);
        }

        const juzListDiv = document.getElementById("juzList");
        for (let i = 1; i <= 30; i++) {
            let startPage;
            if (i === 30) {
                startPage = 587; 
            } else {
                startPage = 3 + ((i - 1) * 20);
            }
            
            let btn = document.createElement("button");
            btn.className = "juz-btn";
            btn.innerText = "جزء " + toPersianNum(i);
            
            btn.onclick = function() {
                let targetPage = startPage;
                if (targetPage % 2 === 0) {
                    targetPage -= 1; 
                }
                currentPage = targetPage;
                updatePages();
                
                document.getElementById('sidebar').classList.remove('open');
            };
            juzListDiv.appendChild(btn);
        }
        
        const delBtn = document.createElement("button");
        delBtn.id = "deleteBtnSidebar";
        delBtn.className = "juz-btn delete-btn";
        delBtn.innerText = "🗑 حذف فایل‌های آفلاین";
        delBtn.style.display = "none"; 
        delBtn.onclick = deleteOfflineFiles;
        juzListDiv.appendChild(delBtn);

        function formatPageNumber(num) {
            return String(num).padStart(3, '0');
        }

        function updatePages() {
            let rightPageNum = currentPage;
            if (rightPageNum % 2 === 0) {
                rightPageNum -= 1;
            }

            document.getElementById("rightPage").src = "Quran" + formatPageNumber(rightPageNum) + ".jpg";
            
            let leftPageNum = rightPageNum + 1;
            if (leftPageNum <= totalPages) {
                document.getElementById("leftPage").src = "Quran" + formatPageNumber(leftPageNum) + ".jpg";
                document.getElementById("leftPage").style.display = "block";
            } else {
                document.getElementById("leftPage").style.display = "none";
            }
            
            currentPage = rightPageNum;
            localStorage.setItem('lastQuranPage', currentPage);
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
            document.querySelector('.main-content').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function nextPage() {
            if (currentPage + 2 <= totalPages) {
                currentPage += 2;
                updatePages();
            }
        }

        function prevPage() {
            if (currentPage - 2 >= 1) {
                currentPage -= 2;
                updatePages();
            } else if (currentPage === 2) {
                currentPage = 1;
                updatePages();
            }
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowLeft') {
                nextPage(); 
            } else if (event.key === 'ArrowRight') {
                prevPage(); 
            }
        });

        window.onload = function() {
            let savedPage = localStorage.getItem('lastQuranPage');
            if (savedPage) {
                currentPage = parseInt(savedPage, 10);
            }
            updatePages();
            
            caches.open('quran-cache-v1').then(cache => {
                cache.match('Quran001.jpg').then(response => {
                    if (response) {
                        setDownloadedUI();
                    }
                });
            });
        };
    </script>
</body>
</html>
